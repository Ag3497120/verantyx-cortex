<!DOCTYPE html>
<html>
<head>
    <title>Verantyx Login Demo</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: white; }
        .login-box { background: #1e293b; padding: 2rem; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); width: 300px; }
        h1 { margin-bottom: 1.5rem; font-size: 1.25rem; text-align: center; }
        .field { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
        input { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; border-radius: 4px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: 600; margin-top: 1rem; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Verantyx Portal</h1>
        <div class="field">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="login-btn">Sign In</button>
    </div>
</body>
</html>
